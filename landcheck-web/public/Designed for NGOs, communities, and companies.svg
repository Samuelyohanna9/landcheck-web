<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Top Organizational Badges -->
  <!-- Left Badge (Global/NGO) -->
  <circle cx="30" cy="24" r="12" fill="#E8F4EC" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="30" cy="24" r="8" fill="none" stroke="#1E5631" stroke-width="1.5"/>
  <path d="M 22 24 H 38 M 30 16 V 32" stroke="#1E5631" stroke-width="1.5"/>

  <!-- Center Badge (Handshake/Community) -->
  <circle cx="60" cy="18" r="13" fill="#1E5631" stroke="#1A1A1A" stroke-width="2"/>
  <path d="M 52 18 L 57 15 L 61 18 L 60 21 L 56 19 Z" fill="#A8D08D" stroke="#FFFFFF" stroke-width="1"/>
  <path d="M 68 18 L 63 15 L 59 18 L 60 21 L 64 19 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1"/>

  <!-- Right Badge (Structure/Company) -->
  <circle cx="90" cy="24" r="12" fill="#E8F4EC" stroke="#1A1A1A" stroke-width="2"/>
  <rect x="87" y="16" width="6" height="5" fill="#1E5631"/>
  <rect x="81" y="25" width="5" height="5" fill="#4C8C5A"/>
  <rect x="94" y="25" width="5" height="5" fill="#4C8C5A"/>
  <path d="M 90 21 V 23 M 83.5 23 H 96.5 M 83.5 23 V 25 M 96.5 23 V 25" stroke="#1A1A1A" stroke-width="1.2"/>

  <!-- Connection Lines to Badges -->
  <path d="M 30 36 L 42 50 M 60 31 V 48 M 90 36 L 78 50" stroke="#1A1A1A" stroke-width="1.5" stroke-dasharray="2 2"/>

  <!-- People / Team Members -->
  <!-- Person 1 (Left) -->
  <circle cx="28" cy="56" r="6" fill="#1A1A1A"/>
  <path d="M 18 75 C 18 64, 38 64, 38 75 Z" fill="#1E5631" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Person 2 (Center-Left) -->
  <circle cx="48" cy="52" r="6" fill="#1A1A1A"/>
  <path d="M 38 75 C 38 61, 58 61, 58 75 Z" fill="#4C8C5A" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Person 3 (Center-Right) -->
  <circle cx="72" cy="52" r="6" fill="#1A1A1A"/>
  <path d="M 62 75 C 62 61, 82 61, 82 75 Z" fill="#1E5631" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Person 4 (Right) -->
  <circle cx="92" cy="56" r="6" fill="#1A1A1A"/>
  <path d="M 82 75 C 82 64, 102 64, 102 75 Z" fill="#4C8C5A" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Conference Table & Laptops -->
  <ellipse cx="60" cy="80" rx="52" ry="10" fill="#E8F4EC" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Laptops -->
  <polygon points="42,76 50,76 52,79 40,79" fill="#1A1A1A"/>
  <polygon points="68,76 76,76 78,79 66,79" fill="#1A1A1A"/>
</svg>
