<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- STEP 1: Hand & Planting Sprout -->
  <path d="M 6 78 C 14 70, 24 72, 30 78 L 24 84 C 18 80, 12 80, 8 84 Z" fill="#4C8C5A" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Soil & Plant -->
  <path d="M 16 74 Q 22 70 28 74" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 22 72 V 60" stroke="#1A1A1A" stroke-width="2"/>
  <path d="M 22 64 Q 14 58 12 62 Q 18 68 22 66" fill="#A8D08D" stroke="#1A1A1A" stroke-width="1.5"/>
  <path d="M 22 62 Q 30 56 32 60 Q 26 66 22 64" fill="#4C8C5A" stroke="#1A1A1A" stroke-width="1.5"/>

  <!-- Arrow 1 -->
  <path d="M 35 65 H 42 M 42 65 L 39 62 M 42 65 L 39 68" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- STEP 2: Protected Tree Crest / Shield -->
  <path d="M 58 45 C 58 45, 72 40, 72 45 C 72 65, 58 78, 58 78 C 58 78, 44 65, 44 45 C 44 40, 58 45, 58 45 Z" fill="#E8F4EC" stroke="#1A1A1A" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Tree inside Shield -->
  <rect x="56" y="62" width="4" height="8" fill="#5C4033"/>
  <circle cx="58" cy="54" r="9" fill="#1E5631" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Arrow 2 -->
  <path d="M 75 65 H 82 M 82 65 L 79 62 M 82 65 L 79 68" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- STEP 3: Impact Ribbon Badge -->
  <!-- Back Ribbons -->
  <polygon points="92,72 88,92 95,87 101,92 98,72" fill="#1E5631" stroke="#1A1A1A" stroke-width="2" stroke-linejoin="round"/>
  <!-- Circular Badge -->
  <circle cx="95" cy="58" r="15" fill="#4C8C5A" stroke="#1A1A1A" stroke-width="2.5"/>
  <circle cx="95" cy="58" r="11" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.5" stroke-dasharray="2 2"/>
  <!-- Checkmark -->
  <path d="M 89 58 L 93 62 L 101 54" fill="none" stroke="#1E5631" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
