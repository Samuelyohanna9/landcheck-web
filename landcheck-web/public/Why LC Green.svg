<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <!-- Outer Mechanical Gear / Ring -->
  <circle cx="70" cy="70" r="54" fill="#E8F4EC" stroke="#1A1A1A" stroke-width="3"/>
  
  <!-- Outer Gear Teeth -->
  <path d="M 64 12 H 76 V 18 H 64 Z 
           M 64 122 H 76 V 128 H 64 Z 
           M 12 64 V 76 H 18 V 64 Z 
           M 122 64 V 76 H 128 V 64 Z" fill="#1E5631" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Inner Dark Green Ring -->
  <circle cx="70" cy="70" r="44" fill="#FFFFFF" stroke="#1E5631" stroke-width="4"/>

  <!-- Central Tree Illustration -->
  <rect x="66" y="80" width="8" height="18" fill="#5C4033" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Tree Leaves -->
  <circle cx="56" cy="62" r="15" fill="#4C8C5A" stroke="#1A1A1A" stroke-width="2.5"/>
  <circle cx="84" cy="62" r="15" fill="#4C8C5A" stroke="#1A1A1A" stroke-width="2.5"/>
  <circle cx="70" cy="48" r="18" fill="#1E5631" stroke="#1A1A1A" stroke-width="2.5"/>
  <path d="M 62 50 Q 70 42 78 50" stroke="#A8D08D" stroke-width="2" fill="none"/>

  <!-- Four Surrounding Satellite Badges -->
  <!-- Top Left: Mobile Device -->
  <circle cx="30" cy="30" r="10" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2"/>
  <rect x="27" y="24" width="6" height="12" rx="1" fill="#1E5631"/>

  <!-- Top Right: Handshake -->
  <circle cx="110" cy="30" r="10" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2"/>
  <path d="M 104 30 L 108 27 L 112 30 L 110 33 Z" fill="#1E5631"/>

  <!-- Bottom Left: Checkmark -->
  <circle cx="30" cy="110" r="10" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2"/>
  <path d="M 25 110 L 29 114 L 35 106" fill="none" stroke="#1E5631" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Bottom Right: Security Key -->
  <circle cx="110" cy="110" r="10" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2"/>
  <circle cx="108" cy="108" r="3" fill="#1E5631"/>
  <path d="M 110 110 L 114 114" stroke="#1E5631" stroke-width="2"/>
</svg>
